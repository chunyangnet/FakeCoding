services:
  fakecoding:
    build:
      context: .
      dockerfile: Dockerfile
    image: fakecoding:local
    ports:
      - "${FAKECODING_PORT:-8084}:${FAKECODING_PORT:-8084}"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    environment:
      FAKECODING_PORT: "${FAKECODING_PORT:-8084}"
